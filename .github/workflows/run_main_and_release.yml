name: Run main.py and Publish Outputs

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      install_ffmpeg:
        description: 'Install ffmpeg before running (true/false)'
        required: false
        default: 'false'
        type: boolean
      max_workers:
        description: 'Max concurrent workers for the script'
        required: false
        default: '2'
        type: string
      dry_run:
        description: 'Dry run mode (true/false)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  run-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install ffmpeg (optional)
        if: ${{ github.event.inputs.install_ffmpeg == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install --no-cache-dir requests beautifulsoup4 tenacity

      - name: Ensure config directory exists
        run: mkdir -p config

      - name: Run main.py
        env:
          MAX_WORKERS: ${{ github.event.inputs.max_workers || '2' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python3 -u main.py

      - name: Generate release tag
        id: tag
        run: echo "tag=auto-run-$(date -u '+%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: ${{ steps.tag.outputs.tag }}
          body: |
            Automated release generated by GitHub Actions workflow run.
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Upload iptv.txt
        if: hashFiles('iptv.txt') != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: iptv.txt
          asset_name: iptv.txt
          asset_content_type: text/plain

      - name: Upload iptv_speed.txt
        if: hashFiles('iptv_speed.txt') != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: iptv_speed.txt
          asset_name: iptv_speed.txt
          asset_content_type: text/plain

      - name: Upload iptv_list.txt
        if: hashFiles('iptv_list.txt') != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: iptv_list.txt
          asset_name: iptv_list.txt
          asset_content_type: text/plain

      - name: Upload unmatched_channels.txt
        if: hashFiles('unmatched_channels.txt') != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: unmatched_channels.txt
          asset_name: unmatched_channels.txt
          asset_content_type: text/plain

      - name: Upload config/urls.txt
        if: hashFiles('config/urls.txt') != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: config/urls.txt
          asset_name: urls.txt
          asset_content_type: text/plain
