# Workflow to Extract WASM

name: Extract WASM

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Move WASM files
        run: mv build/*.wasm tools/ttt/

      - name: Fix SRC Path
        run: sed -i 's|h5\.worker_patch\.js|tools/ttt/h5.worker_patch.js|g' <path_to_your_file> 
