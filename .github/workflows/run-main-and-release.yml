name: CI Workflow

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        run: |
          python main.py

      - name: Create package
        run: |
          mkdir output
          cp IPTV_list.txt output/
          cp "地方频道" output/
          cp "频道模板" output/
          cp config output/
          cp unmatched_channels.txt output/
          tar -cvf package.tar.gz output/
          zip -r package.zip output/

      - name: Create Release
        id: create_release
        uses: actions/github-script@v4
        with:
          script: |
            const response = await github.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `release-${new Date().toISOString().split('T')[0]}`,
              name: `Release - ${new Date().toISOString()}`,
              body: 'Release notes here'
            });
            return response.data;

      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: package.zip
          asset_name: package.zip
          asset_content_type: application/zip

      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: package.tar.gz
          asset_name: package.tar.gz
          asset_content_type: application/gzip

