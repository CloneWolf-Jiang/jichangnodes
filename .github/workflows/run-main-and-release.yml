name: 测试main.py

on:
  workflow_dispatch:

jobs:
  run-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create 频道模板 directory and populate template files
        run: |
          mkdir -p 频道模板

          cat > 频道模板/CCTV.txt <<EOF
          CCTV-1
          CCTV-2
          CCTV-3
          CCTV-4
          CCTV-5
          CCTV-5+
          CCTV-6
          CCTV-7
          CCTV-8
          CCTV-9
          CCTV-10
          CCTV-11
          CCTV-12
          CCTV-13
          CCTV-14
          CCTV-15
          CCTV-16
          CCTV-17
          CCTV-4中文国际
          CCTV-4欧洲
          CCTV-4美洲
          EOF

          cat > 频道模板/主流卫视.txt <<EOF
          湖南卫视
          浙江卫视
          江苏卫视
          东方卫视
          北京卫视
          广东卫视
          深圳卫视
          安徽卫视
          山东卫视
          天津卫视
          重庆卫视
          湖北卫视
          四川卫视
          河南卫视
          江西卫视
          辽宁卫视
          黑龙江卫视
          河北卫视
          山西卫视
          陕西卫视
          吉林卫视
          贵州卫视
          云南卫视
          广西卫视
          内蒙古卫视
          甘肃卫视
          青海卫视
          宁夏卫视
          新疆卫视
          海南卫视
          西藏卫视
          EOF

      - name: Run main.py
        run: python main.py

      - name: Package output files
        run: |
          mkdir -p release_output
          cp -f iptv_list.txt release_output/ 2>/dev/null || true
          cp -f unmatched_channels.txt release_output/ 2>/dev/null || true
          cp -rf config release_output/ 2>/dev/null || true
          cp -rf 地方频道 release_output/ 2>/dev/null || true
          cp -rf 频道模板 release_output/

          cd release_output
          zip -r ../release.zip . -q
          cd ..
          tar -czf release.tar.gz -C release_output .

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ github.run_number }}
          name: Release - ${{ github.run_number }}
          body: |
            Automated release from workflow execution.

            Included:
            - iptv_list.txt
            - unmatched_channels.txt
            - config/
            - 地方频道/
            - 频道模板/

          files: |
            release.zip
            release.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
