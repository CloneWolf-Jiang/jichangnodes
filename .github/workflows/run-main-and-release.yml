name: Run Main and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Create directory and add template files
        run: |
          mkdir -p '频道模板'
          echo 'CCTV Content' > '频道模板/CCTV.txt'
          echo '主流卫视 Content' > '频道模板/主流卫视.txt'
          echo '地方频道 Content' > '频道模板/地方频道.txt'

      - name: Run main.py
        run: |
          python main.py
