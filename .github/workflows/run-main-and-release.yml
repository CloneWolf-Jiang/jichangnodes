name: Run and Release\n\non: workflow_dispatch\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v2\n      - name: Install dependencies\n        run: |\n          sudo apt-get update\n          sudo apt-get install -y ffmpeg\n          pip install -r requirements.txt\n      - name: Run main.py\n        run: python main.py\n      - name: Package output files\n        run: |\n          zip -r output.zip output_directory/\n          tar -czvf output.tar.gz output_directory/\n      - name: Create Release\n        uses: actions/create-release@v1\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n        with:\n          tag_name: v1.0.0\n          release_name: Release v1.0.0\n          draft: false\n          prerelease: false\n      - name: Upload Release Assets\n        uses: actions/upload-release-asset@v1\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n        with:\n          upload_url: ${{ github.event.release.upload_url }}\n          asset_path: ./output.zip\n          asset_name: output.zip\n          asset_content_type: application/zip\n      - name: Upload Release Assets (tar.gz)\n        uses: actions/upload-release-asset@v1\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n        with:\n          upload_url: ${{ github.event.release.upload_url }}\n          asset_path: ./output.tar.gz\n          asset_name: output.tar.gz\n          asset_content_type: application/gzip\n