name: Release Workflow

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v1.0  # Update the tag name as needed
          release_name: Release v1.0  # Update the release name as needed
          body: 'Release notes for version 1.0'  # Add release notes

      - name: Upload Release Asset
        uses: actions/upload-release-asset@latest
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: path/to/asset.zip  # Update the asset path
          asset_name: asset.zip  # Update the asset name
          asset_content_type: application/zip
